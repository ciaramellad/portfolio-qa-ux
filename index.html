<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daiana Ciaramella | QA Portfolio</title>
  <script>
    // Robust fix for "Cannot set property fetch of #<Window> which has only a getter"
    (function () {
      // Try to define a setter that ignores assignments to prevent the TypeError
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get: function () { return originalFetch; },
          set: function (v) {
            console.warn('Attempted to overwrite window.fetch ignored');
            return originalFetch;
          }
        });
      } catch (e) {
        // If it's already non-configurable, we can't do much here,
        // but the global error handler below will catch the TypeError.
      }

      // Catch the error globally as a fallback
      window.addEventListener('error', function (e) {
        const msg = e.message || (e.error && e.error.message) || '';
        if (msg.includes('Cannot set property fetch') || msg.includes('fetch of #<Window>')) {
          e.preventDefault();
          e.stopPropagation();
          console.warn('Suppressed fetch property error');
        }
      }, true);

      // Handle unhandled rejections just in case
      window.addEventListener('unhandledrejection', function (e) {
        const msg = (e.reason && e.reason.message) || '';
        if (msg.includes('Cannot set property fetch') || msg.includes('fetch of #<Window>')) {
          e.preventDefault();
          e.stopPropagation();
          console.warn('Suppressed fetch property rejection');
        }
      });
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
